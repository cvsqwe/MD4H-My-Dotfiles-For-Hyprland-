

# 2. Импорт модулей
source = ~/.config/hypr/conf.d/monitors.conf
source = ~/.config/hypr/conf.d/apps.conf
source = ~/.config/hypr/conf.d/appearance.conf
source = ~/.config/hypr/conf.d/keybinds.conf
source = ~/.config/hypr/conf.d/rules.conf

# 3. Базовые настройки ввода (оставим тут для быстрого доступа)
input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
    sensitivity = -0.3
    accel_profile = flat
}
